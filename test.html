<!DOCTYPE html>
<html>
<head>
    <title>Taleem Admin Client Test</title>
</head>
<body>

<button id="login">Login</button>

<script src="Connection.js"></script>
<script src="TaleemAdminClient.js"></script>

<script>

const taleem = new TaleemAdminClient(
    "http://127.0.0.1:9000"
);

document
    .getElementById("login")
    .onclick = async () => {

        try {

            await taleem.login(
                "test@example.com",
                "12345678"
            );

            console.log(
                taleem.isLoggedIn()
            );

        }
        catch(err){

            console.error(err);

        }

    };

</script>

</body>
</html>
